version: '3.8'

services:
  # Banco de dados PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: cardapio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-cardapio_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cardapio_pass}
      POSTGRES_DB: ${DB_NAME:-cardapio_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cardapio_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-cardapio_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (NestJS)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cardapio_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USERNAME:-cardapio_user}:${DB_PASSWORD:-cardapio_pass}@postgres:5432/${DB_NAME:-cardapio_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@cardapio.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cardapio_network
    expose:
      - "3000"

  # Frontend (Next.js)
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: cardapio_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      - api
    networks:
      - cardapio_network
    ports:
      - "${WEB_PORT:-3001}:3000"

  # Nginx Reverse Proxy (opcional para produção)
  nginx:
    image: nginx:alpine
    container_name: cardapio_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - api
      - web
    networks:
      - cardapio_network
    ports:
      - "${NGINX_PORT:-80}:80"
    profiles:
      - with-nginx

volumes:
  postgres_data:
    driver: local

networks:
  cardapio_network:
    driver: bridge
